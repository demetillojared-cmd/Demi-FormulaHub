<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kratos Hub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
  body { background: #f0f4f8; display: flex; height: 100vh; overflow: hidden; position: relative; }

  /* Sidebar */
  #sidebar {
    width: 250px;
    background: #2c3e50;
    color: white;
    padding: 20px;
    overflow-y: auto;
  }
  #sidebar h2 { margin-bottom: 10px; font-size: 18px; color: #ecf0f1; }
  #sidebar button {
    display: block;
    width: 100%;
    background: #34495e;
    border: none;
    color: white;
    padding: 10px;
    margin-bottom: 5px;
    border-radius: 5px;
    text-align: left;
    cursor: pointer;
  }
  #sidebar button:hover { background: #1abc9c; }

  /* Main content */
  #main {
    flex: 1;
    background: #ecf0f1;
    padding: 20px;
    overflow-y: auto;
    position: relative;
  }
  .card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    margin-bottom: 20px;
  }
  h1 { margin-bottom: 15px; color: #2c3e50; text-align: center; }
  h2 { color: #2980b9; margin-bottom: 10px; }
  p { margin-bottom: 8px; line-height: 1.5; }

  /* Contact Section */
  #contact {
    background: #ffffff;
    padding: 15px;
    border-top: 2px solid #2c3e50;
    text-align: center;
    font-size: 14px;
  }

  /* Footer signature */
  #signature {
    position: fixed;
    bottom: 10px;
    right: 10px;
    font-size: 14px;
    color: #7f8c8d;
    font-style: italic;
  }

  @media(max-width: 768px){
    body { flex-direction: column; }
    #sidebar { width: 100%; height: auto; }
  }
</style>
</head>
<body>

<div id="sidebar">
  <h2>Categories</h2>
  <button onclick="showCategory('arithmetic')">Basic Arithmetic</button>
  <button onclick="showCategory('fractions')">Fractions & Decimals</button>
  <button onclick="showCategory('percentage')">Percentage & Ratio</button>
  <button onclick="showCategory('algebra')">Algebra</button>
  <button onclick="showCategory('geometry')">Geometry</button>
  <button onclick="showCategory('trigonometry')">Trigonometry</button>
  <button onclick="showCategory('coordinate')">Coordinate Geometry</button>
  <button onclick="showCategory('statistics')">Statistics & Probability</button>
  <button onclick="showCategory('calculus')">Calculus</button>
  <button onclick="showCategory('advanced')">Advanced / Other</button>
</div>

<div id="main">
  <h1>Kratos Hub</h1>
  <div id="content" class="card">
    <p>Select a category from the sidebar to see formulas!</p>
  </div>

  <!-- Contact Section -->
  <div id="contact">
    <strong>Contact Us</strong><br>
    Gmail: yourgmail@example.com <br>
    Contact No: 09157959424
  </div>
</div>

<div id="signature">by Kratos</div>

<script>
function showCategory(category) {
  document.getElementById("content").innerHTML =
    "<h2>" + category.toUpperCase() + "</h2><p>Formulas will appear here.</p>";
}
</script>

</body>
</html>
